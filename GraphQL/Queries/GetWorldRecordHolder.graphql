query GetWorldRecordHolder($xxHash: String!, $hash: String!) {
    worldRecordGlobals(
        filter: {
            level: {
                or: [
                    { xxHash: { equalTo: $xxHash } }
                    {
                        and: [
                            { hash: { equalTo: $hash } }
                            { adventure: { equalTo: true } }
                        ]
                    }
                ]
            }
        }
    ) {
        nodes {
            record {
                time
                user {
                    steamName
                }
            }
        }
    }
}
