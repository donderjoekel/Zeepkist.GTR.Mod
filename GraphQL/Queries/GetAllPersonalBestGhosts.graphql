query GetAllPersonalBestGhosts($xxHash: String!, $hash: String!, $first: Int = null) {
  records(
    filter: {
      level: {
        or: [
          { xxHash: { equalTo: $xxHash } }
          {
            and: [
              { hash: { equalTo: $hash } }
              { adventure: { equalTo: true } }
            ]
          }
        ]
      }
      personalBestGlobalsExist: true
    }
    first: $first
    orderBy: TIME_ASC
  ) {
    nodes {
      ...GhostRecordFrag
    }
  }
}
