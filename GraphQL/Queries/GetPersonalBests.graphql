query GetPersonalBests($xxHash: String!, $hash: String!, $first: Int = null, $offset: Int = null) {
    records(
        filter: {
            level: {
                or: [
                    { xxHash: { equalTo: $xxHash } }
                    {
                        and: [
                            { hash: { equalTo: $hash } }
                            { adventure: { equalTo: true } }
                        ]
                    }
                ]
            }
            personalBestGlobalsExist: true
        }
        first: $first
        offset: $offset
        orderBy: TIME_ASC
    ) {
        nodes {
            user {
                steamName
                steamId
            }
            time
        }
    }
}
