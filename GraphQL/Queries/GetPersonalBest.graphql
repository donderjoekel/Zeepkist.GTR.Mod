query GetPersonalBest($xxHash: String!, $hash: String!, $steamId: BigInt) {
    personalBestGlobals(
        filter: {
            level: {
                or: [
                    { xxHash: { equalTo: $xxHash } }
                    {
                        and: [
                            { hash: { equalTo: $hash } }
                            { adventure: { equalTo: true } }
                        ]
                    }
                ]
            }
            user: { steamId: { equalTo: $steamId } }
        }
    ) {
        nodes {
            record {
                time
            }
        }
    }
}
