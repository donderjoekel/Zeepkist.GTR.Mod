query GetAdditionalGhosts($ids: [BigInt!], $xxHash: String!, $hash: String!) {
  personalBestGlobals(
    filter: {
      level: {
        or: [
          { xxHash: { equalTo: $xxHash } }
          {
            and: [
              { hash: { equalTo: $hash } }
              { adventure: { equalTo: true } }
            ]
          }
        ]
      }
      user: { steamId: { in: $ids } }
    }
  ) {
    nodes {
      record {
        ...GhostRecordFrag
      }
    }
  }
}
