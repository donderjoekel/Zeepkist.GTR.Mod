query GetPlayerRankOnLevel($xxHash: String!, $hash: String!, $time: Float!) {
    records(
        filter: {
            personalBestGlobalsExist: true
            time: { lessThan: $time }
            level: {
                or: [
                    { xxHash: { equalTo: $xxHash } }
                    {
                        and: [
                            { hash: { equalTo: $hash } }
                            { adventure: { equalTo: true } }
                        ]
                    }
                ]
            }
        }
        orderBy: TIME_ASC
    ) {
        totalCount
    }
}
