}

"A connection to a list of `User` values, with data from `ZslRoundResult`."
type ZslRoundUsersByZslRoundResultManyToManyConnection {
  "A list of `User` objects."
  nodes: [User!]!
  "A list of edges which contains the `User`, info from the `ZslRoundResult`, and the cursor to aid in pagination."
  edges: [ZslRoundUsersByZslRoundResultManyToManyEdge!]!
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "The count of *all* `User` you could get from the connection."
  totalCount: Int!
  "Aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  aggregates: UserAggregates
  "Grouped aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  groupedAggregates("The method to use when grouping `User` for these aggregates." groupBy: [UserGroupBy!]! "Conditions on the grouped aggregates." having: UserHavingInput): [UserAggregates!]
}

"A `User` edge in the connection, with data from `ZslRoundResult`."
type ZslRoundUsersByZslRoundResultManyToManyEdge {
  "A cursor for use in pagination."
  cursor: Cursor
  "The `User` at the end of the edge."
  node: User!
  position: Int!
  points: Int!
  dateCreated: Datetime!
  dateUpdated: Datetime
}

"A connection to a list of `ZslLevelResult` values."
