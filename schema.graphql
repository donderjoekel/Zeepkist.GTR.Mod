"A condition to be used against `ZslSeason` object types. All fields are tested\nfor equality and combined with a logical ‘and.’"
input ZslSeasonCondition {
  "Checks for equality with the object’s `id` field."
  id: Int
  "Checks for equality with the object’s `pointsStructureId` field."
  pointsStructureId: Int
  "Checks for equality with the object’s `name` field."
  name: String
  "Checks for equality with the object’s `startDate` field."
  startDate: Datetime
  "Checks for equality with the object’s `endDate` field."
  endDate: Datetime
  "Checks for equality with the object’s `dateCreated` field."
  dateCreated: Datetime
  "Checks for equality with the object’s `dateUpdated` field."
  dateUpdated: Datetime
}

"A connection to a list of `ZslRound` values."
type ZslRoundsConnection {
  "A list of `ZslRound` objects."
  nodes: [ZslRound!]!
  "A list of edges which contains the `ZslRound` and cursor to aid in pagination."
  edges: [ZslRoundsEdge!]!
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "The count of *all* `ZslRound` you could get from the connection."
  totalCount: Int!
  "Aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  aggregates: ZslRoundAggregates
  "Grouped aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  groupedAggregates("The method to use when grouping `ZslRound` for these aggregates." groupBy: [ZslRoundGroupBy!]! "Conditions on the grouped aggregates." having: ZslRoundHavingInput): [ZslRoundAggregates!]
}

"A `ZslRound` edge in the connection."
type ZslRoundsEdge {
  "A cursor for use in pagination."
  cursor: Cursor
  "The `ZslRound` at the end of the edge."
  node: ZslRound!
}

type ZslRoundAggregates {
  keys: [String!]
  "Sum aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  sum: ZslRoundSumAggregates
  "Distinct count aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  distinctCount: ZslRoundDistinctCountAggregates
  "Minimum aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  min: ZslRoundMinAggregates
  "Maximum aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  max: ZslRoundMaxAggregates
  "Mean average aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  average: ZslRoundAverageAggregates
  "Sample standard deviation aggregates across the matching connection (ignoring before\/after\/first\/last\/offset)"
  stddevSample: ZslRoundStddevSampleAggregates
