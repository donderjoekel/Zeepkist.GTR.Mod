name: pre-release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build from (e.g. main or feature/my-branch)
        required: true
      version:
        description: Version to stamp in csproj and tag (e.g. 1.3.0-beta.1 or v1.3.0-beta.1)
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: Extract version (trim leading v)
        shell: pwsh
        run: |
          $raw = "${{ inputs.version }}"
          $version = $raw -replace '^v',''
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}

      - name: Create pre-release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ env.VERSION }}"
          $body = "Built from ``${{ inputs.branch }}``"
          gh release create $tag --target "${{ inputs.branch }}" --prerelease --title $tag --notes $body
          $uploadUrl = gh api "repos/${{ github.repository }}/releases/tags/$tag" --jq .upload_url
          "upload_url=$uploadUrl" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 8.0.x

      - name: Detect csproj
        id: csproj
        uses: ./.github/actions/detect-csproj

      - name: Set CSProj Version
        uses: KageKirin/set-csproj-version@d450aed0cc1a1e9d04c47d017a59c05287202007 # v1.0.0
        with:
          file: ${{ steps.csproj.outputs.csproj_name }}.csproj
          version: ${{ env.VERSION }}

      - name: Publish
        run: dotnet publish --artifacts-path "C:\out"

      - name: Get AssemblyName
        id: asm
        uses: ./.github/actions/get-assembly-name
        with:
          csproj: ${{ steps.csproj.outputs.csproj_name }}

      - name: Remove msstore source
        run: winget source remove msstore

      - name: Install Mono
        run: winget install -e --id Mono.Mono --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: PDB2MDB
        shell: cmd
        run: >
          "C:\Program Files\Mono\bin\pdb2mdb.bat"
          "C:\out\publish\${{ steps.csproj.outputs.csproj_name }}\debug\${{ steps.asm.outputs.assembly_name }}.dll"

      - name: Zip build
        shell: pwsh
        run: |
          $src = "C:\out\publish\${{ steps.csproj.outputs.csproj_name }}\debug"
          $dst = "C:\out\build-${{ env.VERSION }}.zip"
          if (Test-Path $dst) { Remove-Item $dst -Force }
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force

      - name: Attach build to GitHub release
        uses: shogo82148/actions-upload-release-asset@dbfb35b0d9069ff70bc1f9e47faba33ee30b2681 # v1.7.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: C:\out\build-${{ env.VERSION }}.zip
          asset_name: Zeepkist.GTR.Mod-${{ env.VERSION }}.zip
          asset_content_type: application/zip
          overwrite_asset: true
